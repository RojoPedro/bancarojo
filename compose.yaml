services:
  postgres:
    image: postgres:16
    container_name: bancarojo-db
    environment:
      POSTGRES_DB: bancarojo
      POSTGRES_USER: bancarojo_user
      POSTGRES_PASSWORD: bancarojo_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bancarojo-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: